# cognitive-core language pack: Angular (v18-21)
# Source this file or copy settings into your cognitive-core.conf

CC_LANGUAGE="angular"
CC_LINT_COMMAND="npx ng lint"
CC_LINT_EXTENSIONS=".ts .html .scss .css"
CC_TEST_COMMAND="npx ng test --watch=false --browsers=ChromeHeadless"
CC_FORMAT_COMMAND="npx prettier --check \$1"
CC_TEST_PATTERN="**/*.spec.ts"

# Angular-specific environment
CC_ENV_VARS=""

# Lint suppression pattern (ERE) for debt tracking
CC_LINT_SUPPRESS_PATTERN="// eslint-disable|// @ts-ignore|// @ts-expect-error|// @ts-nocheck|/\\* eslint-disable|// noinspection"

# Angular-specific blocked patterns
CC_BLOCKED_PATTERNS=""

# Angular-specific: version and tooling defaults
CC_ANGULAR_VERSION_MIN="18"
CC_ANGULAR_TESTING_LIB="jest"
CC_ANGULAR_E2E="playwright"
