#!/bin/false
# cognitive-core language pack: Angular monitor patterns
# Sourced by workspace-monitor skill for Angular projects

# Log file patterns (glob, relative to project root)
MONITOR_LOG_PATTERNS="logs/*.log *.log"

# Logging config files to discover custom log paths
MONITOR_LOG_CONFIG="angular.json package.json"

# Error regex (pipe-separated, POSIX ERE)
MONITOR_ERROR_REGEX="TypeError|ReferenceError|SyntaxError|RangeError|Error:|error TS[0-9]+|Cannot find module|MODULE_NOT_FOUND|ENOENT|UnhandledPromiseRejection|NullInjectorError|NG0[0-9]+|StaticInjectorError|ExpressionChangedAfterItHasBeenCheckedError|ASSERTION ERROR|Template parse errors|is not a known element|No provider for|Circular dependency|Uncaught.*Error|Zone.*error|Can't bind to"

# Test result format
MONITOR_TEST_FORMAT="jest"

# Test result patterns (pipe-separated)
MONITOR_TEST_REGEX="FAIL|Tests.*failed|Test Suites.*failed|Executed.*FAILED|ERROR.*spec|error TS[0-9]+:|TOTAL:.*FAILED"

# Test result file locations (glob, relative to project root)
MONITOR_TEST_FILES="test-results/*.xml coverage/lcov.info jest-results.json playwright-report/**/*.json"

# Build artifact patterns (glob, relative to project root)
MONITOR_BUILD_ARTIFACTS="dist/**/*.js dist/**/index.html dist/**/main.*.js"

# Build success/failure indicators
MONITOR_BUILD_SUCCESS="Build at:|Compiled successfully|Build complete|Application bundle generation complete"
MONITOR_BUILD_FAILURE="Error:|Build failed|error TS[0-9]+:|Module not found|Cannot find module|Budget exceeded|Cannot resolve"
