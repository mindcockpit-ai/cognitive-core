# cognitive-core language pack: React / TypeScript
# Source this file or copy settings into your cognitive-core.conf

CC_LANGUAGE="react"
CC_LINT_COMMAND="npx eslint \$1"
CC_LINT_EXTENSIONS=".js .ts .jsx .tsx .css .scss"
CC_TEST_COMMAND="npx vitest run"
CC_FORMAT_COMMAND="npx prettier --check \$1"
CC_TEST_PATTERN="**/*.test.{ts,tsx,js,jsx} **/*.spec.{ts,tsx,js,jsx}"

# React-specific environment
CC_ENV_VARS="NODE_PATH=\${PROJECT_DIR}/src:\$NODE_PATH"

# Lint suppression pattern (ERE) for debt tracking
CC_LINT_SUPPRESS_PATTERN="// eslint-disable|// @ts-ignore|// @ts-expect-error|// @ts-nocheck|/\\* eslint-disable|PropTypes"

# React-specific blocked patterns (legacy anti-patterns to flag)
CC_BLOCKED_PATTERNS=""

# React-specific: TypeScript migration tracking
CC_REACT_TS_STRICT="true"
CC_REACT_TESTING_LIB="vitest"
CC_REACT_E2E="playwright"
