#!/bin/false
# cognitive-core language pack: React/TypeScript monitor patterns
# Sourced by workspace-monitor skill for React/TypeScript projects

# Log file patterns (glob, relative to project root)
MONITOR_LOG_PATTERNS="logs/*.log *.log .next/trace"

# Logging config files to discover custom log paths
MONITOR_LOG_CONFIG="package.json vite.config.ts vite.config.js next.config.js next.config.mjs"

# Error regex (pipe-separated, POSIX ERE)
MONITOR_ERROR_REGEX="TypeError|ReferenceError|SyntaxError|RangeError|Error:|error TS[0-9]+|Cannot find module|MODULE_NOT_FOUND|ENOENT|UnhandledPromiseRejection|Invalid hook call|React has detected a change in the order of Hooks|Maximum update depth exceeded|Objects are not valid as a React child|Each child in a list should have a unique|Cannot read propert|is not a function|Hydration failed|There was an error while hydrating"

# Test result format
MONITOR_TEST_FORMAT="vitest"

# Test result patterns (pipe-separated)
MONITOR_TEST_REGEX="FAIL|Tests.*failed|Test Files.*failed|error TS[0-9]+:|Failed to compile|BREAKING CHANGE|Expected.*Received|AssertionError"

# Test result file locations (glob, relative to project root)
MONITOR_TEST_FILES="test-results/*.xml vitest-results.json coverage/lcov.info playwright-report/**/*.json"

# Build artifact patterns (glob, relative to project root)
MONITOR_BUILD_ARTIFACTS="dist/**/*.js build/**/*.js .next/**/*.js out/**/*.html"

# Build success/failure indicators
MONITOR_BUILD_SUCCESS="Compiled successfully|Build complete|built in|ready in|Local:|Network:"
MONITOR_BUILD_FAILURE="Failed to compile|Build error|Module not found|Cannot resolve|chunk .* exceeded|Could not resolve|TS[0-9]+:"
