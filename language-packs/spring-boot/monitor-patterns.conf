#!/bin/false
# cognitive-core language pack: Spring Boot monitor patterns
# Sourced by workspace-monitor skill for Spring Boot projects

# Log file patterns (glob, relative to project root)
MONITOR_LOG_PATTERNS="logs/*.log *.log target/*.log build/*.log"

# Logging config files to discover custom log paths
MONITOR_LOG_CONFIG="application.yml application.yaml application.properties logback-spring.xml log4j2-spring.xml pom.xml build.gradle"

# Error regex (pipe-separated, POSIX ERE)
MONITOR_ERROR_REGEX="BeanCreationException|NoSuchBeanDefinitionException|DataIntegrityViolationException|ConstraintViolationException|HttpMessageNotReadableException|MethodArgumentNotValidException|AccessDeniedException|AuthenticationException|LazyInitializationException|OptimisticLockException|TransactionSystemException|CannotCreateTransactionException|DataAccessException|JpaSystemException|HibernateException|ApplicationContextException|PortInUseException|NoHandlerFoundException|HttpRequestMethodNotSupportedException|UnsatisfiedDependencyException|CircularDependencyException|BeanCurrentlyInCreationException|ClassNotFoundException|NoClassDefFoundError|OutOfMemoryError|StackOverflowError"

# Test result format
MONITOR_TEST_FORMAT="junit"

# Test result patterns (pipe-separated)
MONITOR_TEST_REGEX="Tests run:.*Failures:|BUILD FAILURE|Test.*FAILED|Failures:.*Errors:|Tests.*failed|COMPILATION ERROR"

# Test result file locations (glob, relative to project root)
MONITOR_TEST_FILES="target/surefire-reports/*.xml target/failsafe-reports/*.xml build/test-results/**/*.xml build/reports/tests/**/*.html"

# Build artifact patterns (glob, relative to project root)
MONITOR_BUILD_ARTIFACTS="target/*.jar target/*.war build/libs/*.jar build/libs/*.war"

# Build success/failure indicators
MONITOR_BUILD_SUCCESS="BUILD SUCCESS|BUILD SUCCESSFUL|Started .* in .* seconds"
MONITOR_BUILD_FAILURE="BUILD FAILURE|BUILD FAILED|COMPILATION ERROR|Compilation failure|Could not resolve dependencies"
