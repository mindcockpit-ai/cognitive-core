# cognitive-core language pack: Spring Boot (v2-v4)
# Source this file or copy settings into your cognitive-core.conf

CC_LANGUAGE="spring-boot"
CC_LINT_COMMAND="./mvnw checkstyle:check -q 2>/dev/null || ./gradlew checkstyleMain -q 2>/dev/null || echo 'No lint configured'"
CC_LINT_EXTENSIONS=".java .xml .yml .yaml .properties .gradle .kts"
CC_TEST_COMMAND="./mvnw test -q 2>/dev/null || ./gradlew test -q 2>/dev/null || echo 'No test runner configured'"
CC_FORMAT_COMMAND="./mvnw spotless:check -q 2>/dev/null || echo 'No formatter configured'"
CC_TEST_PATTERN="**/*Test.java **/*Tests.java **/*IT.java"

# Spring Boot-specific environment
CC_ENV_VARS=""

# Lint suppression pattern (ERE) for debt tracking
CC_LINT_SUPPRESS_PATTERN="@SuppressWarnings|//NOSONAR|// NOPMD|@Generated|@SuppressFBWarnings"

# Spring Boot-specific blocked patterns
CC_BLOCKED_PATTERNS=""

# Spring Boot-specific: version and tooling defaults
CC_SPRING_BOOT_VERSION_MIN="2"
CC_SPRING_BOOT_TESTING_LIB="junit5"
CC_SPRING_BOOT_E2E="testcontainers"
