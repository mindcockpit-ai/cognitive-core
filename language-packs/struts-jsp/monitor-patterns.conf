#!/bin/false
# cognitive-core language pack: Struts + JSP monitor patterns
# Sourced by workspace-monitor skill for legacy Java web projects

# Log file patterns (glob, relative to project root)
MONITOR_LOG_PATTERNS="logs/*.log *.log target/*.log catalina.out"

# Logging config files to discover custom log paths
MONITOR_LOG_CONFIG="log4j.properties log4j.xml log4j2.xml logback.xml web.xml pom.xml build.xml"

# Error regex (pipe-separated, POSIX ERE)
MONITOR_ERROR_REGEX="NullPointerException|ClassNotFoundException|NoClassDefFoundError|ClassCastException|IllegalArgumentException|SQLException|IOException|ServletException|JspException|ActionServletException|StrutsException|OgnlException|BeanCreationException|NoSuchBeanDefinitionException|OutOfMemoryError|StackOverflowError|java\.lang\.Error|SEVERE:|FATAL:"

# Test result format
MONITOR_TEST_FORMAT="junit"

# Test result patterns (pipe-separated)
MONITOR_TEST_REGEX="Tests run:.*Failures:|BUILD FAILURE|Test.*FAILED|Errors:.*[1-9]|TESTS FAILED"

# Test result file locations (glob, relative to project root)
MONITOR_TEST_FILES="target/surefire-reports/*.xml target/test-reports/*.xml build/test-results/**/*.xml test-output/**/*.xml"

# Build artifact patterns (glob, relative to project root)
MONITOR_BUILD_ARTIFACTS="target/*.war target/*.ear dist/*.war build/*.war"

# Build success/failure indicators
MONITOR_BUILD_SUCCESS="BUILD SUCCESS|BUILD SUCCESSFUL|build.xml.*BUILD SUCCESSFUL"
MONITOR_BUILD_FAILURE="BUILD FAILURE|BUILD FAILED|COMPILATION ERROR|javac.*error:|Compilation failure"
