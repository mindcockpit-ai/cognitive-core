# cognitive-core language pack: Struts + JSP (Legacy Java Web)
# For software archeology — understanding, auditing, and migrating legacy Java portals
# Supports: Struts 1.x, Struts 2.x, JSP 2.x, JSTL, Tiles, legacy servlet patterns

CC_LANGUAGE="struts-jsp"
CC_LINT_COMMAND="./mvnw checkstyle:check -q 2>/dev/null || mvn checkstyle:check -q 2>/dev/null || ant checkstyle 2>/dev/null || echo 'No lint configured'"
CC_LINT_EXTENSIONS=".java .jsp .xml .properties .tld .tag"
CC_TEST_COMMAND="./mvnw test -q 2>/dev/null || mvn test -q 2>/dev/null || ant test 2>/dev/null || echo 'No test runner configured'"
CC_FORMAT_COMMAND=""
CC_TEST_PATTERN="**/*Test.java **/*Tests.java **/Test*.java"

# Legacy projects often use Ant or bare Maven — no wrapper
CC_ENV_VARS=""

# Lint suppression pattern (ERE) for debt tracking
CC_LINT_SUPPRESS_PATTERN="@SuppressWarnings|//NOSONAR|// NOPMD|@Generated|CHECKSTYLE:OFF|noinspection"

# Struts/JSP-specific blocked patterns (prevent making legacy worse)
CC_BLOCKED_PATTERNS=""

# Legacy-specific settings
CC_STRUTS_VERSION=""
CC_JSP_SCRIPTLET_TOLERANCE="audit"
CC_MIGRATION_TARGET="spring-boot"
