<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#020617"/>

  <!-- Glow effect -->
  <rect x="56" y="56" width="400" height="400" rx="24" fill="url(#glow)"/>

  <!-- Outer square -->
  <rect x="76" y="76" width="360" height="360" rx="16" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>

  <!-- Middle square -->
  <rect x="136" y="136" width="240" height="240" rx="12" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.6"/>

  <!-- Inner square -->
  <rect x="196" y="196" width="120" height="120" rx="8" fill="none" stroke="#38bdf8" stroke-width="5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="18" fill="#38bdf8"/>

  <!-- Cardinal lines (core to outer) -->
  <line x1="256" y1="76" x2="256" y2="196" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="316" x2="256" y2="436" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>
  <line x1="76" y1="256" x2="196" y2="256" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>
  <line x1="316" y1="256" x2="436" y2="256" stroke="#38bdf8" stroke-width="2.5" opacity="0.5"/>

  <!-- Diagonal lines (subtle, corner to corner of middle square) -->
  <line x1="136" y1="136" x2="196" y2="196" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>
  <line x1="316" y1="316" x2="376" y2="376" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>
  <line x1="376" y1="136" x2="316" y2="196" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>
  <line x1="196" y1="316" x2="136" y2="376" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>

  <!-- Node dots on outer square midpoints -->
  <circle cx="256" cy="76" r="5" fill="#38bdf8" opacity="0.7"/>
  <circle cx="256" cy="436" r="5" fill="#38bdf8" opacity="0.7"/>
  <circle cx="76" cy="256" r="5" fill="#38bdf8" opacity="0.7"/>
  <circle cx="436" cy="256" r="5" fill="#38bdf8" opacity="0.7"/>

  <!-- Node dots on outer square corners -->
  <circle cx="76" cy="76" r="4" fill="#818cf8" opacity="0.4"/>
  <circle cx="436" cy="76" r="4" fill="#818cf8" opacity="0.4"/>
  <circle cx="76" cy="436" r="4" fill="#818cf8" opacity="0.4"/>
  <circle cx="436" cy="436" r="4" fill="#818cf8" opacity="0.4"/>
</svg>
