name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Run ShellCheck on core scripts
        run: |
          find core/ -name "*.sh" -type f | xargs shellcheck -S warning
          shellcheck -S warning install.sh update.sh

  frontmatter:
    name: Skill Frontmatter Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: bash tests/suites/02-skill-frontmatter.sh
        env:
          JUNIT_REPORT_DIR: ${{ github.workspace }}/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-frontmatter
          path: test-results/
          retention-days: 7

  hook-protocol:
    name: Hook Protocol Tests
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run hook protocol tests
        run: bash tests/suites/03-hook-protocol.sh
        env:
          JUNIT_REPORT_DIR: ${{ github.workspace }}/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-hook-protocol-${{ matrix.os }}
          path: test-results/
          retention-days: 7

  security-hooks:
    name: Security Hook Tests
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run security hook tests
        run: bash tests/suites/06-security-hooks.sh
        env:
          JUNIT_REPORT_DIR: ${{ github.workspace }}/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-security-hooks-${{ matrix.os }}
          path: test-results/
          retention-days: 7

  agent-permissions:
    name: Agent Permissions Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify agent permissions
        run: bash tests/suites/07-agent-permissions.sh
        env:
          JUNIT_REPORT_DIR: ${{ github.workspace }}/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-agent-permissions
          path: test-results/
          retention-days: 7

  install-integration:
    name: Install & Update Integration
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run install dry-run test
        run: bash tests/suites/04-install-dryrun.sh
        env:
          JUNIT_REPORT_DIR: ${{ github.workspace }}/test-results

      - name: Run update flow test
        run: bash tests/suites/05-update-flow.sh
        env:
          JUNIT_REPORT_DIR: ${{ github.workspace }}/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-install-${{ matrix.os }}
          path: test-results/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "## Security Scan" >> $GITHUB_STEP_SUMMARY
          FOUND=0
          while IFS= read -r f; do
            if grep -lnE '(password|secret|token|api_key)\s*=\s*["\x27][^"\x27]+["\x27]' "$f" 2>/dev/null; then
              echo "::warning file=${f}::Potential hardcoded secret detected"
              FOUND=$((FOUND + 1))
            fi
          done < <(find . -type f \( -name "*.sh" -o -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.conf" \) -not -path './.git/*' -not -path './docs/*' -not -path './examples/*' -not -path './tests/*')
          if [ "$FOUND" -gt 0 ]; then
            echo "::error::Found $FOUND files with potential hardcoded secrets"
            exit 1
          fi
          echo "No hardcoded secrets detected." >> $GITHUB_STEP_SUMMARY

      - name: Check hook scripts for unsafe patterns
        run: |
          UNSAFE=0
          while IFS= read -r f; do
            if grep -nE '(eval |exec |source\s+\$|curl.*\|\s*bash|wget.*\|\s*sh)' "$f" 2>/dev/null; then
              echo "::warning file=${f}::Potentially unsafe shell pattern"
              UNSAFE=$((UNSAFE + 1))
            fi
          done < <(find core/ -name "*.sh" -type f)
          if [ "$UNSAFE" -gt 0 ]; then
            echo "::warning::Found $UNSAFE files with potentially unsafe patterns — review required"
          fi
          echo "Shell security scan complete." >> $GITHUB_STEP_SUMMARY

  summary:
    name: CI Summary
    needs: [shellcheck, frontmatter, hook-protocol, security-hooks, agent-permissions, install-integration, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ShellCheck | ${{ needs.shellcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontmatter | ${{ needs.frontmatter.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hook Protocol | ${{ needs.hook-protocol.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Hooks | ${{ needs.security-hooks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent Permissions | ${{ needs.agent-permissions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Install Integration | ${{ needs.install-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
