name: Welcome First-Time Contributors
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome to cognitive-core! Thanks for opening your first issue. A maintainer will review shortly. Please check [CONTRIBUTING.md](https://github.com/mindcockpit-ai/cognitive-core/blob/main/CONTRIBUTING.md) for guidelines."
          pr-message: "Thanks for your first PR on cognitive-core! Before review, please verify: `bash tests/run-all.sh` passes, commits follow `type(scope): subject` format, and regex uses POSIX ERE only. See [CONTRIBUTING.md](https://github.com/mindcockpit-ai/cognitive-core/blob/main/CONTRIBUTING.md)."
