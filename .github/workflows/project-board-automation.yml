# =============================================================================
# Project Board Automation — cognitive-core
# =============================================================================
# Automates board status transitions based on GitHub events:
#   - PR opened → linked issues move to In Progress (from Todo only)
#   - PR merged → linked issues move to Done
#   - Issue assigned → moves to Todo (from Backlog/Roadmap)
#   - Issue opened → added to board in Backlog
#   - Issue reopened → moves to In Progress
#   - Issue closed → moves to Done
#
# Prerequisites:
#   - Repository secret PROJECT_PAT (classic PAT with repo + project scopes)
# =============================================================================
name: Project Board Automation

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  pull_request:
    types: [opened, ready_for_review, closed]
  issues:
    types: [assigned, opened, closed, reopened]

permissions:
  issues: write
  pull-requests: read

env:
  PROJECT_ID: "PVT_kwDODLDmb84BPbGR"
  STATUS_FIELD_ID: "PVTSSF_lADODLDmb84BPbGRzg91hL4"
  PROJECT_NUMBER: "9"
  PROJECT_OWNER: "mindcockpit-ai"
  ROADMAP_ID: "bc4a7c19"
  BACKLOG_ID: "0624174c"
  TODO_ID: "711ddfb9"
  IN_PROGRESS_ID: "e6a30b30"
  TESTING_ID: "f8614c05"
  DONE_ID: "28f9eecd"
  CANCELED_ID: "95eda9a6"

jobs:
  # ── PR opened → linked issues move to In Progress ──
  pr-opened:
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review')
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PROJECT_PAT not configured — skipping board automation"
            exit 0
          fi
          PR_BODY=$(cat <<'PREOF'
          ${{ github.event.pull_request.body }}
          PREOF
          )
          ISSUES=$(echo "$PR_BODY" | \
            grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
            grep -oE '[0-9]+' | sort -u)

          if [ -z "$ISSUES" ]; then
            echo "No linked issues found in PR body"
            exit 0
          fi

          ITEMS=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --limit 500 2>&1 | tr -d '\000-\037') || {
            echo "::warning::Cannot access project board (ensure PROJECT_PAT has repo, project, and read:org scopes)"
            exit 0
          }

          for ISSUE_NUM in $ISSUES; do
            ITEM_ID=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
              '.items[] | select(.content.number == $n) | .id')
            CURRENT=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
              '.items[] | select(.content.number == $n) | .status')

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              echo "Issue #$ISSUE_NUM not on board, skipping"
              continue
            fi

            if [ "$CURRENT" = "Todo" ]; then
              gh api graphql -f query='mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "'"$PROJECT_ID"'"
                  itemId: "'"$ITEM_ID"'"
                  fieldId: "'"$STATUS_FIELD_ID"'"
                  value: { singleSelectOptionId: "'"$IN_PROGRESS_ID"'" }
                }) { projectV2Item { id } }
              }' || {
                echo "::warning::Board mutation failed for #$ISSUE_NUM (check PROJECT_PAT scopes or project permissions)"
                continue
              }
              echo "Moved #$ISSUE_NUM: Todo → In Progress"
            else
              echo "Issue #$ISSUE_NUM in '$CURRENT', not moving (only Todo → In Progress)"
            fi
          done

  # ── PR merged → linked issues move to Done ──
  pr-merged:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to Done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then exit 0; fi
          PR_BODY=$(cat <<'PREOF'
          ${{ github.event.pull_request.body }}
          PREOF
          )
          ISSUES=$(echo "$PR_BODY" | \
            grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
            grep -oE '[0-9]+' | sort -u)

          if [ -z "$ISSUES" ]; then
            echo "No linked issues found in PR body"
            exit 0
          fi

          ITEMS=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --limit 500 2>&1 | tr -d '\000-\037') || {
            echo "::warning::Cannot access project board (ensure PROJECT_PAT has repo, project, and read:org scopes)"
            exit 0
          }

          for ISSUE_NUM in $ISSUES; do
            ITEM_ID=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
              '.items[] | select(.content.number == $n) | .id')

            if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
              echo "Issue #$ISSUE_NUM not on board, skipping"
              continue
            fi

            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'"
                itemId: "'"$ITEM_ID"'"
                fieldId: "'"$STATUS_FIELD_ID"'"
                value: { singleSelectOptionId: "'"$DONE_ID"'" }
              }) { projectV2Item { id } }
            }' || {
              echo "::warning::Board mutation failed for #$ISSUE_NUM (check PROJECT_PAT scopes or project permissions)"
              continue
            }
            echo "Moved #$ISSUE_NUM → Done (PR merged)"
          done

  # ── Issue assigned (from Backlog/Roadmap) → Todo ──
  issue-assigned:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move assigned issue to Todo if in Backlog/Roadmap
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then exit 0; fi
          ISSUE_NUM=${{ github.event.issue.number }}
          ITEMS=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --limit 500 2>&1 | tr -d '\000-\037') || {
            echo "::warning::Cannot access project board (ensure PROJECT_PAT has repo, project, and read:org scopes)"
            exit 0
          }

          ITEM_ID=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
            '.items[] | select(.content.number == $n) | .id')
          CURRENT=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
            '.items[] | select(.content.number == $n) | .status')

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "Issue #$ISSUE_NUM not on board"
            exit 0
          fi

          if [ "$CURRENT" = "Backlog" ] || [ "$CURRENT" = "Roadmap" ]; then
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'"
                itemId: "'"$ITEM_ID"'"
                fieldId: "'"$STATUS_FIELD_ID"'"
                value: { singleSelectOptionId: "'"$TODO_ID"'" }
              }) { projectV2Item { id } }
            }' || {
              echo "::warning::Board mutation failed for #$ISSUE_NUM (check PROJECT_PAT scopes or project permissions)"
              exit 0
            }
            echo "Moved #$ISSUE_NUM: $CURRENT → Todo (assigned)"
          else
            echo "Issue #$ISSUE_NUM in '$CURRENT', not moving"
          fi

  # ── New issue → add to board in Backlog ──
  issue-opened:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Add new issue to board in Backlog
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PROJECT_PAT not configured — new issue not added to board"
            exit 0
          fi
          ISSUE_NUM=${{ github.event.issue.number }}
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"

          ITEM_ID=$(gh api graphql -f query='mutation {
            addProjectV2ItemById(input: {
              projectId: "'"$PROJECT_ID"'"
              contentId: "'"$ISSUE_NODE_ID"'"
            }) { item { id } }
          }' --jq '.data.addProjectV2ItemById.item.id') || {
            echo "::warning::Board mutation failed for #$ISSUE_NUM (check PROJECT_PAT scopes — org-owned projects need read:org)"
            exit 0
          }

          if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'"
                itemId: "'"$ITEM_ID"'"
                fieldId: "'"$STATUS_FIELD_ID"'"
                value: { singleSelectOptionId: "'"$BACKLOG_ID"'" }
              }) { projectV2Item { id } }
            }' || {
              echo "::warning::Issue #$ISSUE_NUM added to board but could not set Backlog status"
              exit 0
            }
            echo "Added #$ISSUE_NUM to board → Backlog"
          fi

  # ── Issue reopened → move back to In Progress ──
  issue-reopened:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Move reopened issue to In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then exit 0; fi
          ISSUE_NUM=${{ github.event.issue.number }}
          ITEMS=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --limit 500 2>&1 | tr -d '\000-\037') || {
            echo "::warning::Cannot access project board (ensure PROJECT_PAT has repo, project, and read:org scopes)"
            exit 0
          }

          ITEM_ID=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
            '.items[] | select(.content.number == $n) | .id')
          CURRENT=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
            '.items[] | select(.content.number == $n) | .status')

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "Issue #$ISSUE_NUM not on board"
            exit 0
          fi

          if [ "$CURRENT" = "Done" ] || [ "$CURRENT" = "Canceled" ]; then
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'"
                itemId: "'"$ITEM_ID"'"
                fieldId: "'"$STATUS_FIELD_ID"'"
                value: { singleSelectOptionId: "'"$IN_PROGRESS_ID"'" }
              }) { projectV2Item { id } }
            }' || {
              echo "::warning::Board mutation failed for #$ISSUE_NUM (check PROJECT_PAT scopes or project permissions)"
              exit 0
            }
            echo "Moved #$ISSUE_NUM: $CURRENT → In Progress (reopened)"
          fi

  # ── Issue closed → verify acceptance criteria, then move to Done ──
  issue-closed:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Check acceptance criteria and move to Done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then exit 0; fi
          ISSUE_NUM=${{ github.event.issue.number }}

          # --- Approval verification via label (not comment text) ---
          APPROVED=$(gh issue view "$ISSUE_NUM" --repo "$GH_REPO" --json labels \
            --jq '[.labels[].name] | map(select(. == "approved")) | length')

          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --repo "$GH_REPO" --json body --jq '.body // ""')

          # Check if issue has acceptance criteria (checkbox patterns)
          HAS_CRITERIA="false"
          if echo "$ISSUE_BODY" | grep -qE '- \[ \]|- \[x\]'; then
            HAS_CRITERIA="true"
          fi

          if [ "$APPROVED" -eq 0 ] && [ "$HAS_CRITERIA" = "true" ]; then
            echo "Issue #$ISSUE_NUM has acceptance criteria but no 'approved' label — reopening"
            gh issue reopen "$ISSUE_NUM" --repo "$GH_REPO"
            GUARD_MSG="**Closure guard (CI)**: This issue was closed without the \`approved\` label."
            GUARD_MSG="$GUARD_MSG"$'\n\n'"The issue body contains acceptance criteria checkboxes, but no \`approved\` label was found."
            GUARD_MSG="$GUARD_MSG"$'\n\n'"Please verify all acceptance criteria and close via \`/project-board close\` or"
            GUARD_MSG="$GUARD_MSG"$'\n'"add the \`approved\` label before closing."
            gh issue comment "$ISSUE_NUM" --repo "$GH_REPO" --body "$GUARD_MSG"
            exit 0
          fi

          # --- Move to Done on board ---
          # Strip control chars (U+0000-U+001F) to prevent jq parse failures
          ITEMS=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --limit 500 2>&1 | tr -d '\000-\037') || {
            echo "::warning::Cannot access project board (ensure PROJECT_PAT has repo, project, and read:org scopes)"
            exit 0
          }

          ITEM_ID=$(echo "$ITEMS" | jq -r --argjson n "$ISSUE_NUM" \
            '.items[] | select(.content.number == $n) | .id')

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ]; then
            echo "Issue #$ISSUE_NUM not on board"
            exit 0
          fi

          gh api graphql -f query='mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: "'"$PROJECT_ID"'"
              itemId: "'"$ITEM_ID"'"
              fieldId: "'"$STATUS_FIELD_ID"'"
              value: { singleSelectOptionId: "'"$DONE_ID"'" }
            }) { projectV2Item { id } }
          }' || {
            echo "::warning::Board mutation failed for #$ISSUE_NUM (check PROJECT_PAT scopes or project permissions)"
            exit 0
          }
          echo "Moved #$ISSUE_NUM → Done (closed, criteria verified)"

  # ── Weekly reconciliation — catch any closed issues with stale board status ──
  board-reconcile:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile closed issues with board status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_TOKEN" ]; then exit 0; fi

          # Get all board items, strip control chars
          ITEMS=$(gh project item-list "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --format json --limit 500 2>&1 | tr -d '\000-\037') || exit 0

          # Find items NOT in Done/Canceled
          ACTIVE_NUMS=$(echo "$ITEMS" | jq -r '
            .items[] |
            select(.content.type == "Issue") |
            select(.status != "Done" and .status != "Canceled") |
            .content.number
          ' | sort -n -u)

          FIXED=0
          for NUM in $ACTIVE_NUMS; do
            STATE=$(gh issue view "$NUM" --repo "$GH_REPO" --json state --jq '.state' 2>/dev/null)
            if [ "$STATE" = "CLOSED" ]; then
              ITEM_ID=$(echo "$ITEMS" | jq -r --argjson n "$NUM" \
                '.items[] | select(.content.number == $n) | .id' | head -1)
              if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
                gh api graphql -f query='mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "'"$PROJECT_ID"'"
                    itemId: "'"$ITEM_ID"'"
                    fieldId: "'"$STATUS_FIELD_ID"'"
                    value: { singleSelectOptionId: "'"$DONE_ID"'" }
                  }) { projectV2Item { id } }
                }' --silent || {
                  echo "::warning::Board mutation failed for #$NUM (check PROJECT_PAT scopes or project permissions)"
                  continue
                }
                echo "Reconciled #$NUM → Done (was closed but board status stale)"
                FIXED=$((FIXED + 1))
              fi
            fi
          done
          echo "Reconciliation complete: $FIXED issues fixed"
